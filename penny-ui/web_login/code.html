<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editorial Play - Welcome Back</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be_Vietnam_Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#a27cff",
                    "on-tertiary-fixed-variant": "#625600",
                    "on-error": "#ffefef",
                    "secondary": "#006859",
                    "primary": "#6a37d4",
                    "on-primary-fixed-variant": "#370086",
                    "on-tertiary-container": "#584d00",
                    "on-tertiary": "#fff3bf",
                    "surface-bright": "#f5f6f7",
                    "on-tertiary-fixed": "#433a00",
                    "inverse-primary": "#a078ff",
                    "on-surface-variant": "#595c5d",
                    "inverse-surface": "#0c0f10",
                    "on-secondary-fixed": "#00483d",
                    "on-background": "#2c2f30",
                    "secondary-dim": "#005a4d",
                    "surface-dim": "#d1d5d7",
                    "on-secondary-container": "#005d4f",
                    "on-secondary-fixed-variant": "#006859",
                    "on-primary": "#f8f0ff",
                    "on-secondary": "#c2ffef",
                    "surface-container-low": "#eff1f2",
                    "background": "#f5f6f7",
                    "surface-tint": "#6a37d4",
                    "tertiary-fixed": "#f4db36",
                    "surface-variant": "#dadddf",
                    "tertiary-fixed-dim": "#e5cd27",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#dadddf",
                    "surface-container-high": "#e0e3e4",
                    "tertiary": "#685c00",
                    "primary-fixed": "#ae8dff",
                    "error": "#b41340",
                    "secondary-fixed-dim": "#00efce",
                    "secondary-container": "#26fedc",
                    "primary-container": "#ae8dff",
                    "error-container": "#f74b6d",
                    "surface": "#f5f6f7",
                    "tertiary-container": "#f4db36",
                    "surface-container": "#e6e8ea",
                    "secondary-fixed": "#26fedc",
                    "tertiary-dim": "#5b5000",
                    "on-surface": "#2c2f30",
                    "on-primary-fixed": "#000000",
                    "on-primary-container": "#2b006e",
                    "error-dim": "#a70138",
                    "outline-variant": "#abadae",
                    "inverse-on-surface": "#9b9d9e",
                    "primary-dim": "#5e26c7",
                    "on-error-container": "#510017",
                    "outline": "#757778"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-bg {
            background: radial-gradient(circle at 10% 20%, rgba(174, 141, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(38, 254, 220, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(244, 219, 54, 0.1) 0%, transparent 60%);
        }
    </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen flex items-center justify-center p-6 kinetic-bg overflow-hidden">
<!-- Login Container -->
<main class="w-full max-w-md flex flex-col items-center text-center space-y-12">
<!-- Mascot Section with Asymmetric Depth -->
<div class="relative w-full flex justify-center pt-8">
<!-- Decorative Bubble Behind Mascot -->
<div class="absolute -top-4 w-64 h-64 bg-primary-container/20 rounded-full blur-3xl -z-10"></div>
<div class="relative group">
<!-- Floating Element 1 (Coin) -->
<div class="absolute -top-6 -right-6 w-16 h-16 bg-tertiary-container rounded-full shadow-lg shadow-tertiary/20 flex items-center justify-center -rotate-12 transition-transform group-hover:rotate-0 duration-300">
<span class="material-symbols-outlined text-tertiary text-3xl">currency_exchange</span>
</div>
<!-- Floating Element 2 (Sparkle) -->
<div class="absolute bottom-4 -left-8 w-12 h-12 bg-secondary-container rounded-full shadow-lg shadow-secondary/20 flex items-center justify-center rotate-12 transition-transform group-hover:rotate-0 duration-300">
<span class="material-symbols-outlined text-secondary text-2xl">auto_awesome</span>
</div>
<!-- Main Mascot -->
<div class="w-72 h-72 relative">
<img alt="Friendly pixel art mascot welcoming the user back" class="w-full h-full object-contain drop-shadow-xl" data-alt="A super cute, friendly pixel-art mascot for a teen finance app. A small, round, yellow robot-like character with big expressive digital eyes, wearing a tiny hoodie." src="https://lh3.googleusercontent.com/aida-public/AMZpY0O69v8090L7Ww7Wv8E4W890W7W890W7W890W7W890W7W890W7W890W7W890W7W890W7W890W7W890W7W890"/>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-4">
<h1 class="font-headline font-black text-4xl md:text-5xl tracking-tight text-on-background">
                Welcome back!
            </h1>
<p class="font-body font-medium text-lg text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                Your money, your rules.
            </p>
</div>
<!-- Minimalist Login Action -->
<div class="w-full space-y-8">
<button class="w-full bg-surface-container-lowest text-on-surface font-headline font-bold py-5 px-8 rounded-full shadow-xl shadow-primary/5 border border-outline-variant/10 flex items-center justify-center gap-4 hover:scale-[0.98] transition-all duration-300 active:scale-95 group">
<!-- Google G Icon (Simulated with Vector Approach) -->
<svg class="group-hover:scale-110 transition-transform" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-lg">Login with Google</span>
</button>
<!-- Secondary CTA / Footer Link -->
</div>
<!-- Footer Decorative Element -->
<div class="absolute bottom-10 flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-8 h-2 rounded-full bg-primary-container shadow-sm"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
</div>
</main>
<!-- Pocket Pixel Chat Bubble (Contextual Feedback) -->
<div class="fixed top-12 right-12 hidden lg:flex flex-col items-end">
<div class="bg-surface-container-lowest p-6 rounded-xl rounded-bl-sm shadow-2xl shadow-primary/10 max-w-[200px] border border-outline-variant/5">
<p class="font-headline font-bold text-sm text-on-surface">Psst! All your progress is saved safely here.</p>
</div>
<div class="w-4 h-4 bg-surface-container-lowest -mt-1 mr-4 rotate-45 border-r border-b border-outline-variant/5"></div>
</div>
</body></html>
